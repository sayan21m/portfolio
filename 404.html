<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Page Not Found | Sayan Garai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/icons.css">
  <link rel="stylesheet" href="css/error-page.css">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
</head>
<body class="error-page">

  <header class="error-page__header">
    <div class="container">
      <a href="index.html" class="error-page__logo" aria-label="Sayan Garai — Home">
        <span class="nav__logo-bracket">&lt;</span>SG<span class="nav__logo-bracket">/&gt;</span>
      </a>
    </div>
  </header>

  <main class="error-page__main" role="main">
    <div class="error-page__content">
      <div class="error-page__illustration" aria-hidden="true">
        <span data-icon="alert-circle" class="icon icon--xl"></span>
      </div>

      <p class="error-page__code" aria-hidden="true">404</p>
      <h1 class="error-page__title">Page Not Found</h1>
      <p class="error-page__text">
        The page you're looking for doesn't exist or has been moved.
        Let's get you back on track.
      </p>

      <div class="error-page__actions">
        <a href="index.html" class="btn btn--primary ripple">
          <span data-icon="home" class="icon icon--sm"></span>
          Back Home
        </a>
        <a href="index.html#projects" class="btn btn--secondary ripple">
          <span data-icon="folder" class="icon icon--sm"></span>
          View Projects
        </a>
      </div>
    </div>
  </main>

  <script src="js/icons.js" defer></script>
  <script src="js/script.js" defer></script>
</body>
</html>
