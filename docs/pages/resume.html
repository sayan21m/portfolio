<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Resume of Sayan Garai — IT Engineering student, Machine Learning and Backend Developer.">
  <meta name="robots" content="index, follow">
  <title>Resume | Sayan Garai</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/icons.css">
  <link rel="stylesheet" href="../css/features.css">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
</head>
<body class="resume-page">

  <a href="#main" class="skip-link">Skip to main content</a>

  <header class="header header--scrolled" role="banner">
    <nav class="nav container" aria-label="Resume page navigation">
      <a href="../index.html" class="nav__logo" aria-label="Back to portfolio home">
        <span class="nav__logo-bracket">&lt;</span>SG<span class="nav__logo-bracket">/&gt;</span>
      </a>

      <div class="nav__tools" role="group" aria-label="Portfolio tools">
        <button
          type="button"
          class="nav__launcher nav__launcher--pill"
          id="open-command-palette"
          aria-label="Open command palette"
          aria-keyshortcuts="Control+K Meta+K"
        >
          <span data-icon="search" class="icon" aria-hidden="true"></span>
          <span class="nav__launcher-label">Search</span>
          <span class="nav__launcher-kbd" data-palette-kbd>Ctrl K</span>
        </button>
        <button
          type="button"
          class="nav__launcher nav__launcher--icon"
          id="open-terminal"
          aria-label="Open developer terminal"
        >
          <span data-icon="code" class="icon" aria-hidden="true"></span>
        </button>
      </div>

      <a href="../index.html#projects" class="nav__link nav__link--cta">
        <span data-icon="arrow-left" class="icon icon--sm"></span>
        Portfolio
      </a>
    </nav>
  </header>

  <main id="main">

    <section class="resume-page__hero" aria-labelledby="resume-title">
      <div class="container">
        <span class="case-hero__tag">Resume</span>
        <h1 class="resume-page__title" id="resume-title">Sayan Garai — Resume</h1>
        <p class="resume-page__subtitle">
          IT Engineering student focused on Machine Learning and Backend Development.
          Download, print, or view the full PDF below.
        </p>

        <div class="resume-page__toolbar" role="toolbar" aria-label="Resume actions">
          <a href="../assets/resume.pdf" class="btn btn--primary btn--sm ripple" id="resume-download" download="Sayan-Garai-Resume.pdf">
            <span data-icon="download" class="icon icon--sm"></span>
            Download
          </a>
          <button type="button" class="btn btn--secondary btn--sm ripple" id="resume-print">
            <span data-icon="file-text" class="icon icon--sm"></span>
            Print
          </button>
          <button type="button" class="btn btn--secondary btn--sm ripple" id="resume-fullscreen">
            <span data-icon="external-link" class="icon icon--sm"></span>
            Fullscreen
          </button>
          <a href="../assets/resume.pdf" class="btn btn--ghost btn--sm ripple" target="_blank" rel="noopener noreferrer">
            <span data-icon="external-link" class="icon icon--sm"></span>
            Open in new tab
          </a>
        </div>
      </div>
    </section>

    <div class="resume-page__viewer-wrap">
      <div class="container">
        <div class="resume-page__viewer" id="resume-viewer" aria-label="Embedded resume PDF">
          <button
            type="button"
            class="btn btn--secondary btn--sm ripple resume-page__exit-fs"
            id="resume-exit-fs"
            hidden
          >
            <span data-icon="x" class="icon icon--sm"></span>
            Exit fullscreen
          </button>
          <object
            id="resume-object"
            class="resume-page__frame"
            type="application/pdf"
            data="../assets/resume.pdf#view=FitH"
            aria-label="Sayan Garai resume, PDF"
          >
            <div class="resume-page__fallback" role="alert">
              <div class="resume-page__fallback-icon" aria-hidden="true">
                <span data-icon="file-text" class="icon icon--lg"></span>
              </div>
              <h3>Resume preview unavailable</h3>
              <p>
                Your browser can't embed this PDF, or the resume file hasn't been added yet.
                You can still download it below.
              </p>
              <p style="margin-top: var(--space-md);">
                <a href="../assets/resume.pdf" class="btn btn--primary btn--sm ripple" download="Sayan-Garai-Resume.pdf">
                  <span data-icon="download" class="icon icon--sm"></span>
                  Download PDF
                </a>
              </p>
            </div>
          </object>
        </div>
      </div>
    </div>

  </main>

  <footer class="footer" role="contentinfo">
    <div class="container footer__inner">
      <p class="footer__copyright">&copy; <span id="footer-year"></span> Sayan Garai — Resume</p>
      <a href="../index.html" class="btn btn--ghost btn--sm ripple">
        <span data-icon="arrow-left" class="icon icon--sm"></span>
        Back to Portfolio
      </a>
    </div>
  </footer>

  <script src="../js/loader.js"></script>
  <script src="../js/paths.js"></script>
  <script src="../js/icons.js" defer></script>
  <script src="../js/features.js" defer></script>
  <script src="../js/script.js" defer></script>

  <script>
    /* Page-local wiring — resume toolbar */
    (function () {
      'use strict';
      const viewer = document.getElementById('resume-viewer');
      const printBtn = document.getElementById('resume-print');
      const fsBtn = document.getElementById('resume-fullscreen');
      const exitFsBtn = document.getElementById('resume-exit-fs');
      const yearEl = document.getElementById('footer-year');
      const obj = document.getElementById('resume-object');

      if (yearEl) yearEl.textContent = new Date().getFullYear();

      /* Verify the PDF actually loads; if it 404s, show the fallback. */
      fetch('../assets/resume.pdf', { method: 'HEAD' })
        .then((r) => {
          if (!r.ok) throw new Error('PDF not found');
        })
        .catch(() => {
          if (obj) obj.setAttribute('data', 'about:blank');
        });

      if (printBtn) {
        printBtn.addEventListener('click', () => {
          const w = window.open('../assets/resume.pdf', '_blank');
          if (w) {
            w.addEventListener('load', () => {
              try { w.print(); } catch (_) { /* browser will handle */ }
            });
          }
        });
      }

      function enterFullscreen() {
        viewer.classList.add('is-fullscreen');
        if (exitFsBtn) exitFsBtn.hidden = false;
        document.body.classList.add('has-modal-open');
      }
      function exitFullscreen() {
        viewer.classList.remove('is-fullscreen');
        if (exitFsBtn) exitFsBtn.hidden = true;
        document.body.classList.remove('has-modal-open');
      }
      if (fsBtn) fsBtn.addEventListener('click', enterFullscreen);
      if (exitFsBtn) exitFsBtn.addEventListener('click', exitFullscreen);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && viewer.classList.contains('is-fullscreen')) {
          exitFullscreen();
        }
      });
    })();
  </script>
</body>
</html>
